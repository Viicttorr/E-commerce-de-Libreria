<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>CyberBooks-Detalle</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">

  <!-- Barra de navegación -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold">📚 CyberBooks</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
        <ul class="navbar-nav">
          <li class="nav-item"><a class="nav-link active" href="{% url 'main' %}">Todos los libros</a></li>
          <li class="nav-item"><a class="nav-link active">CATEGORIAS: </a></li>
          <li class="nav-item"><a class="nav-link" href="{% url 'categorias' 'Terror' %}">Terror</a></li>
          <li class="nav-item"><a class="nav-link" href="{% url 'categorias' 'Ciencia Ficción' %}">Ciencia Ficción</a></li>
          <li class="nav-item"><a class="nav-link" href="{% url 'categorias' 'Novela' %}">Novela</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Contenido principal -->
  <div class="container py-5">
    <h1 class="text-center mb-5 text-info">Detalles del Libro</h1>
    <div class="row g-5 align-items-center">
      
      <!-- Imagen ampliada -->
      <div class="col-md-5 text-center">
        <img src="{{libro.Imagen}}" class="img-fluid rounded shadow-lg" alt="Portada ampliada">
      </div>

      <!-- Información del libro -->
      <div class="col-md-7">
        <div class="bg-secondary p-4 rounded shadow-lg">
          <h2 class="text-warning">{{ libro.nombre_producto }}</h2>
          <p class="mb-3"><strong>Autor:</strong> {{ libro.Autor }}</p>
          <p class="mb-3"style="text-align: justify;"><strong>Descripción:</strong>{{ libro.Descripcion }} </p>
          <p class="mb-3"><strong>Stock disponible:</strong> {{ libro.stock }} unidades</p>
          <p class="mb-3"><strong>Precio:</strong> <span class="badge bg-success fs-5">${{ libro.precio }}</span></p>
          <a href="#" class="btn btn-primary">Comprar</a>
        </div>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
