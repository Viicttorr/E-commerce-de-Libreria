<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>CyberBooks-Categoría</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">

  <!-- Barra de navegación -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold">📚 CyberBooks</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
        <ul class="navbar-nav">
          <li class="nav-item"><a class="nav-link active" href="{% url 'main' %}">Todos los libros</a></li>
          <li class="nav-item"><a class="nav-link active">CATEGORIAS: </a></li>
        <li class="nav-item"><a class="nav-link" href="{% url 'categorias' 'Terror' %}">Terror</a></li>
          <li class="nav-item"><a class="nav-link" href="{% url 'categorias' 'Ciencia Ficción' %}">Ciencia Ficción</a></li>
          <li class="nav-item"><a class="nav-link" href="{% url 'categorias' 'Novela' %}">Novela</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Contenido principal -->
  
    {% if categorias %} 
    <div class="container py-5">
        <h1 class="text-center mb-5 text-info">Libros de {{ categorias.0.genero }}</h1>
        <div class="row g-4 justify-content-center">
     

        <!-- Tarjeta de libro -->
        {% for categoria in categorias %}
        <div class="col-sm-6 col-md-4 col-lg-3">
            <div class="card bg-secondary text-light h-100 border-0 shadow-lg">
            <img src="{{ categoria.Imagen }}" class="card-img-top" alt="Portada libro" style="height: 500px; object-fit: cover;">
            <div class="card-body d-flex flex-column">
                <h5 class="card-title text-warning">{{ categoria.nombre_producto }}</h5>
                <p class="card-text mb-4">Autor: {{ categoria.Autor }}</p>
                <a href="{% url 'detalles' categoria.id %}" class="btn btn-primary">Ver detalle</a>
            </div>
            </div>
        </div>
        {% endfor %}
        </div>
    </div>
    {% endif %}
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
